<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria | Armor</title>
    <link rel="icon" type="image/png" sizes="192x192" href="/images/logo/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/images/logo/android-chrome-512x512.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/logo/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/logo/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/logo/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/images/logo/android-chrome-192x192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/images/logo/android-chrome-512x512.png">
    <link rel="manifest" href="/images/logo/site.webmanifest">
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        // Zabezpieczenia przed kopiowaniem
        document.addEventListener('contextmenu', function(e) { 
            e.preventDefault(); 
            return false; 
        });
        document.addEventListener('selectstart', function(e) {
            e.preventDefault();
            return false;
        });
        document.addEventListener('copy', function(e) {
            e.preventDefault();
            return false;
        });
    </script>
    <style>
        body {
            min-height: 100vh;
            background: #0a0e17;
        }
        
        .gallery-section {
            padding: 120px 20px 60px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .gallery-hero {
            text-align: center;
            padding: 40px 20px;
            margin-bottom: 40px;
        }
        
        .gallery-hero h1 {
            font-family: 'Michroma', sans-serif;
            font-size: 3rem;
            color: #00d4ff;
            margin-bottom: 15px;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }
        
        .gallery-hero p {
            color: #888;
            font-size: 1.2rem;
        }
        
        /* Carousel Styles */
        .carousel-container {
            position: relative;
            max-width: 1000px;
            margin: 0 auto 50px;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.3);
        }
        
        .carousel-slide {
            display: none;
            animation: fade 0.6s ease-in-out;
        }
        
        .carousel-slide.active {
            display: block;
        }
        
        @keyframes fade {
            from { opacity: 0.5; transform: scale(1.05); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .carousel-slide img {
            width: 100%;
            height: 550px;
            object-fit: cover;
            border-radius: 20px;
        }
        
        .carousel-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 40px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.95));
            border-radius: 0 0 20px 20px;
        }
        
        .carousel-caption h3 {
            font-family: 'Michroma', sans-serif;
            color: #fff;
            font-size: 1.8rem;
            margin: 0;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        
        .carousel-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 212, 255, 0.15);
            border: 2px solid rgba(0, 212, 255, 0.3);
            color: #00d4ff;
            font-size: 28px;
            padding: 18px 24px;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .carousel-nav:hover {
            background: #00d4ff;
            color: #0a0e17;
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.6);
        }
        
        .carousel-prev { left: 25px; }
        .carousel-next { right: 25px; }
        
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 25px;
        }
        
        .carousel-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(0, 212, 255, 0.25);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .carousel-dot.active {
            background: #00d4ff;
            box-shadow: 0 0 15px #00d4ff;
            transform: scale(1.2);
            border-color: rgba(0, 212, 255, 0.5);
        }
        
        /* Gallery Grid - Masonry Style */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 20px;
        }
        
        .gallery-item {
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid rgba(0, 212, 255, 0.15);
            background: rgba(26, 35, 54, 0.6);
            aspect-ratio: 4/3;
        }
        
        .gallery-item:hover {
            transform: translateY(-12px) scale(1.03);
            border-color: #00d4ff;
            box-shadow: 0 25px 50px rgba(0, 212, 255, 0.35);
        }
        
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        
        .gallery-item:hover img {
            transform: scale(1.15);
        }
        
        .gallery-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 25px;
            background: linear-gradient(transparent 10%, rgba(0, 0, 0, 0.95));
            transform: translateY(100%);
            transition: transform 0.4s ease;
        }
        
        .gallery-item:hover .gallery-overlay {
            transform: translateY(0);
        }
        
        .gallery-overlay span {
            color: #fff;
            font-weight: 700;
            font-size: 1.2rem;
            font-family: 'Rajdhani', sans-serif;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        
        /* Empty State */
        .empty-gallery {
            text-align: center;
            padding: 80px 20px;
            color: #666;
        }
        
        .empty-gallery i {
            font-size: 4rem;
            color: rgba(0, 212, 255, 0.3);
            margin-bottom: 20px;
        }
        
        .empty-gallery p {
            font-size: 1.3rem;
            font-family: 'Rajdhani', sans-serif;
        }
        
        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.97);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(15px);
        }
        
        .lightbox.active {
            display: flex;
        }
        
        .lightbox img {
            max-width: 92%;
            max-height: 88%;
            object-fit: contain;
            border-radius: 15px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
            animation: lightboxIn 0.4s ease;
        }
        
        @keyframes lightboxIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .lightbox-close {
            position: absolute;
            top: 25px;
            right: 35px;
            color: white;
            font-size: 45px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10000;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
        }
        
        .lightbox-close:hover {
            color: #00d4ff;
            transform: rotate(90deg);
            background: rgba(0, 212, 255, 0.2);
        }
        
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 55px;
            cursor: pointer;
            padding: 25px;
            transition: all 0.3s ease;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 50%;
            border: 2px solid rgba(0, 212, 255, 0.2);
        }
        
        .lightbox-nav:hover {
            background: #00d4ff;
            color: #0a0e17;
            transform: translateY(-50%) scale(1.15);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.5);
        }
        
        .lightbox-prev { left: 25px; }
        .lightbox-next { right: 25px; }
        
        .lightbox-counter {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 25px;
            border-radius: 25px;
        }
    </style>
</head>
<body>
    <div id="technicalBreakOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 14, 23, 0.98); z-index: 99999; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;">
        <i class="fas fa-tools" style="font-size: 4rem; color: #00d4ff; margin-bottom: 30px;"></i>
        <h1 style="font-family: 'Michroma', sans-serif; font-size: 2.5rem; color: #00d4ff; margin-bottom: 20px;">PRZERWA TECHNICZNA</h1>
        <p id="technicalBreakMessage" style="font-family: 'Rajdhani', sans-serif; font-size: 1.3rem; color: #aaa; max-width: 600px; line-height: 1.6;"></p>
        <p style="font-family: 'Rajdhani', sans-serif; font-size: 1rem; color: #666; margin-top: 40px;">Prosimy cierpliwie czekać na zakończenie prac serwisowych.</p>
    </div>
    <div class="hero-bg"></div>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="//" class="logo"><i class="fas fa-shield-alt"></i> ARMOR</a>
            <ul class="nav-links">
                <li><a href="//">Start</a></li>
                <li><a href="//sklep">Sklep</a></li>
                <li><a href="//galeria" class="active">Galeria</a></li>
            </ul>
        </div>
    </nav>
    
    <section class="gallery-section">
        <div class="gallery-hero">
            <h1>GALERIA</h1>
            <p>Zobacz nasze zdjęcia</p>
        </div>
        
        <!-- Carousel -->
        <div class="carousel-container" id="carousel"></div>
        
        <!-- Gallery Grid -->
        <div class="gallery-grid" id="galleryGrid"></div>
    </section>
    
    <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <span class="lightbox-nav lightbox-prev" onclick="prevImage(event)">&#10094;</span>
        <img id="lightboxImg" src="" alt="">
        <span class="lightbox-nav lightbox-next" onclick="nextImage(event)">&#10095;</span>
        <div class="lightbox-counter"><span id="currentIndex">1</span> / <span id="lightboxTotalImages">0</span></div>
    </div>
    
    <footer>
        <div class="footer-container">
            <div class="footer-logo"><i class="fas fa-shield-alt"></i> ARMOR</div>
            <div class="footer-copy">© 2026 ARMOR</div>
        </div>
    </footer>
    
    <script>
    let galleryItems = [];
    let carouselItems = [];
    let currentImageIndex = 0;
    let currentSlide = 0;
    let carouselInterval = null;

    function escapeHtml(text) {
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }
    
    // Load gallery from API
    async function loadGallery() {
        try {
            const res = await fetch('/api/gallery');
            if (!res.ok) throw new Error('Błąd pobierania galerii');

            const data = await res.json();
            galleryItems = Array.isArray(data) ? data : [];
            
            // Use first 4 images for carousel (or repeat if less)
            carouselItems = galleryItems.slice(0, 4);
            if (carouselItems.length > 0 && carouselItems.length < 4) {
                while (carouselItems.length < 4) {
                    carouselItems.push(carouselItems[carouselItems.length % galleryItems.length]);
                }
            }
            
            renderCarousel();
            renderGallery();
        } catch (err) {
            console.error('Błąd ładowania galerii:', err);
            galleryItems = [];
            carouselItems = [];
            renderEmptyState();
        }
    }
    
    function renderCarousel() {
        const container = document.getElementById('carousel');

        if (carouselInterval) {
            clearInterval(carouselInterval);
            carouselInterval = null;
        }
        
        if (carouselItems.length === 0) {
            container.innerHTML = '';
            return;
        }
        
        let html = '';
        carouselItems.forEach((item, i) => {
            html += `
                <div class="carousel-slide ${i === 0 ? 'active' : ''}">
                    <img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.title || 'Zdjęcie')}">
                    <div class="carousel-caption"><h3>${escapeHtml(item.title || 'ARMOR')}</h3></div>
                </div>
            `;
        });
        
        html += `
            <button class="carousel-nav carousel-prev" onclick="changeSlide(-1)">&#10094;</button>
            <button class="carousel-nav carousel-next" onclick="changeSlide(1)">&#10095;</button>
            <div class="carousel-dots" id="carouselDots"></div>
        `;
        
        container.innerHTML = html;
        
        // Create dots
        const dotsContainer = document.getElementById('carouselDots');
        for (let i = 0; i < carouselItems.length; i++) {
            const dot = document.createElement('div');
            dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
            dot.onclick = () => goToSlide(i);
            dotsContainer.appendChild(dot);
        }
        
        // Auto slide
        carouselInterval = setInterval(() => changeSlide(1), 5000);
    }
    
    function changeSlide(direction) {
        const slides = document.querySelectorAll('.carousel-slide');
        const dots = document.querySelectorAll('.carousel-dot');
        if (slides.length === 0) return;
        
        slides[currentSlide].classList.remove('active');
        dots[currentSlide].classList.remove('active');
        
        currentSlide = (currentSlide + direction + slides.length) % slides.length;
        
        slides[currentSlide].classList.add('active');
        dots[currentSlide].classList.add('active');
    }
    
    function goToSlide(index) {
        const slides = document.querySelectorAll('.carousel-slide');
        const dots = document.querySelectorAll('.carousel-dot');
        if (slides.length === 0) return;
        
        slides[currentSlide].classList.remove('active');
        dots[currentSlide].classList.remove('active');
        currentSlide = index;
        slides[currentSlide].classList.add('active');
        dots[currentSlide].classList.add('active');
    }
    
    function renderGallery() {
        const container = document.getElementById('galleryGrid');
        
        if (galleryItems.length === 0) {
            renderEmptyState();
            return;
        }
        
        container.innerHTML = galleryItems.map((item, i) => `
            <div class="gallery-item" onclick="openLightbox(${i})">
                <img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.title || 'Zdjęcie')}">
                <div class="gallery-overlay"><span>${escapeHtml(item.title || ('Zdjęcie ' + (i+1)))}</span></div>
            </div>
        `).join('');

        const totalEl = document.getElementById('lightboxTotalImages');
        if (totalEl) totalEl.textContent = galleryItems.length;
    }
    
    function renderEmptyState() {
        const container = document.getElementById('galleryGrid');
        container.innerHTML = `
            <div class="empty-gallery" style="grid-column: 1/-1;">
                <i class="fas fa-images"></i>
                <p>Galeria jest pusta</p>
            </div>
        `;
        const totalEl = document.getElementById('lightboxTotalImages');
        if (totalEl) totalEl.textContent = '0';
    }
    
    // Lightbox
    function openLightbox(index) {
        if (!galleryItems.length || index < 0 || index >= galleryItems.length) return;
        currentImageIndex = index;
        updateLightbox();
        document.getElementById('lightbox').classList.add('active');
    }
    
    function updateLightbox() {
        if (!galleryItems.length || !galleryItems[currentImageIndex]) return;
        const item = galleryItems[currentImageIndex];
        const img = document.getElementById('lightboxImg');
        img.src = item.image;
        img.alt = item.title || 'Zdjęcie';
        document.getElementById('currentIndex').textContent = currentImageIndex + 1;
        const totalEl = document.getElementById('lightboxTotalImages');
        if (totalEl) totalEl.textContent = galleryItems.length;
    }
    
    function closeLightbox(event) {
        if (!event || event.target.id === 'lightbox' || event.target.classList.contains('lightbox-close')) {
            document.getElementById('lightbox').classList.remove('active');
        }
    }
    
    function nextImage(event) {
        if (event) event.stopPropagation();
        if (!galleryItems.length) return;
        currentImageIndex = (currentImageIndex + 1) % galleryItems.length;
        updateLightbox();
    }
    
    function prevImage(event) {
        if (event) event.stopPropagation();
        if (!galleryItems.length) return;
        currentImageIndex = (currentImageIndex - 1 + galleryItems.length) % galleryItems.length;
        updateLightbox();
    }
    
    // Keyboard navigation
    document.addEventListener('keydown', function(e) {
        if (document.getElementById('lightbox').classList.contains('active')) {
            if (e.key === 'ArrowLeft') prevImage(e);
            if (e.key === 'ArrowRight') nextImage(e);
            if (e.key === 'Escape') closeLightbox();
        }
    });
    
    // Technical break check
    (function() {
        try {
            fetch('/api/break-status')
                .then(function(res) {
                    if (!res.ok) throw new Error('Błąd pobierania statusu przerwy');
                    return res.json();
                })
                .then(function(data) {
                    if (data.isActive) {
                        var url = window.location.href.toLowerCase();
                        if (!url.includes('admin') && !url.includes('login')) {
                            var overlay = document.getElementById('technicalBreakOverlay');
                            if (data.message) {
                                document.getElementById('technicalBreakMessage').textContent = data.message;
                            }
                            overlay.style.display = 'flex';
                        }
                    }
                });
        } catch(e) {}
    })();
    
    // Load gallery on page load
    loadGallery();
    </script>
</body>
</html>
